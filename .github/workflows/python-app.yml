name: 每日股票分析

on:
  schedule:
    # 交易日运行时间（UTC时间）
    # 北京时间 9:30, 11:30, 14:00, 15:00
    - cron: '30 1,3,6,7 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-stocks:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: 检出代码
      uses: actions/checkout@v4


    # 2. 详细调试：检查文件和权限
    - name: 详细文件检查
      run: |
        echo "=== 当前目录 ==="
        pwd
        echo ""
        echo "=== 完整文件列表 ==="
        ls -la
        echo ""
        echo "=== 检查文件类型 ==="
        for file in stock_analysis.py requirements.txt; do
          if [ -f "$file" ]; then
            echo "✅ $file 存在"
            echo "   权限: $(ls -la $file | awk '{print $1}')"
            echo "   大小: $(wc -l < $file) 行"
            echo "   编码: $(file -bi $file)"
            echo "   前3行:"
            head -3 "$file" || echo "   无法读取"
          else
            echo "❌ $file 不存在"
          fi
          echo ""
        done
        
        echo "=== 尝试执行Python脚本 ==="
        python -c "print('Python测试: 成功')" && echo "✅ Python可用"
        
        echo "=== 检查Python脚本语法 ==="
        python -m py_compile stock_analysis.py 2>/dev/null && echo "✅ 语法正确" || echo "❌ 语法错误"

    
    # 2. 设置Python环境
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    # 3. 安装依赖（使用清华镜像加速）
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas -i https://pypi.tuna.tsinghua.edu.cn/simple
        pip install akshare --upgrade -i https://pypi.tuna.tsinghua.edu.cn/simple
    
   
    # 5. 运行股票分析脚本
    - name: 运行股票分析
      env:
        WECHAT_TOKEN: ${{ secrets.WECHAT_TOKEN }}
      run: |
        echo "开始执行股票分析脚本..."
        python stock_analysis.py
        
        echo "执行完成后检查文件:"
        ls -la *.txt 2>/dev/null || echo "没有找到.txt文件"
        echo ""
        echo "创建测试文件验证上传功能..."
        date > test_report.txt
        echo "股票分析测试" >> test_report.txt
        echo "生成时间: $(date)" >> test_report.txt
    
    # 6. 上传报告文件（修复版）
    - name: 上传报告文件
      uses: actions/upload-artifact@v4
      with:
        name: stock-reports
        path: |
          stock_report_*.txt
          test_report.txt
        if-no-files-found: warn  # 如果没有文件，只警告不失败
