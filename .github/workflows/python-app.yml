name: 每日股票分析

on:
  schedule:
    - cron: '30 1,3,6,7 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        pip install requests pandas
        pip install akshare --upgrade
    
    - name: 运行股票分析
      env:
        WECHAT_TOKEN: ${{ secrets.WECHAT_TOKEN }}
      run: python stock_analysis.py
    
    - name: 上传报告文件
      uses: actions/upload-artifact@v4
      with:
        name: stock-report
        path: stock_report_*.txt
