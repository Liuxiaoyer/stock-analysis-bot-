name: 每日股票分析

on:
  schedule:
    # 交易日运行时间（UTC时间，比北京时间晚8小时）
    # 对应北京时间：9:30, 11:30, 14:00, 15:00
    - cron: '30 1,3,6,7 * * 1-5'
  # 手动触发
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用Node.js 24

jobs:
  analyze-stocks:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: 检出代码
      uses: actions/checkout@v4  # 更新到v4，支持Node.js 24

    # 2. 设置Python环境
    - name: 设置Python
      uses: actions/setup-python@v5  # 更新到v5，支持Node.js 24
      with:
        python-version: '3.10'

    # 3. 安装依赖
    - name: 安装依赖
      run: |
        pip install --upgrade pip
        pip install requests pandas akshare -i https://pypi.tuna.tsinghua.edu.cn/simple

    # 4. 运行分析脚本
    - name: 运行股票分析
      env:
        WECHAT_TOKEN: ${{ secrets.WECHAT_TOKEN }}
      run: |
        # 捕获错误，即使脚本失败也继续运行后续步骤（如果有）
        python stock_analysis.py || true

    # 5. 上传报告文件（如果有生成）
    - name: 上传报告文件
      uses: actions/upload-artifact@v4
      if: always()  # 即使上一步失败也上传
      with:
        name: stock-report
        path: |
          stock_report_*.txt
          error.log  # 如果有错误日志也上传
