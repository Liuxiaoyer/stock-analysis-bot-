name: 每日股票分析

on:
  schedule:
    # 交易日运行时间（UTC时间，比北京时间晚8小时）
    # 对应北京时间：9:30, 11:30, 14:00, 15:00
    - cron: '30 1,3,6,7 * * 1-5'
  # 手动触发
  workflow_dispatch:

# 解决Node.js 20弃用警告
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'  # 暂时允许使用Node.js 20
  # 或者使用更新的Node.js版本（推荐）
  # NODE_VERSION: '20.x'

jobs:
  analyze-stocks:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码
    - name: 检出代码
      uses: actions/checkout@v4  # 更新到v4
    
    # 2. 设置Python环境
    - name: 设置Python
      uses: actions/setup-python@v5  # 更新到v5
      with:
        python-version: '3.10'
    
    # 3. 安装依赖
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas
        pip install akshare --upgrade
    
    # 4. 测试Python环境
    - name: 测试环境
      run: |
        python --version
        pip list | grep akshare
    
    # 5. 运行分析脚本（添加详细日志）
    - name: 运行股票分析
      env:
        WECHAT_TOKEN: ${{ secrets.WECHAT_TOKEN }}
      run: |
        echo "开始运行股票分析脚本..."
        python -c "print('Python环境正常')"
        # 先检查脚本是否存在
        if [ -f "stock_analysis.py" ]; then
          echo "找到stock_analysis.py文件"
          python stock_analysis.py
        else
          echo "错误：找不到stock_analysis.py文件"
          ls -la
          exit 1
        fi
    
    # 6. 上传报告文件
    - name: 上传报告文件
      if: always()  # 即使失败也上传日志
      uses: actions/upload-artifact@v4
      with:
        name: stock-reports
        path: |
          stock_report_*.txt
          *.log
          error.log
